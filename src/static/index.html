<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jentic Mini</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }
        .stats {
            display: flex;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .search-box {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            background: #0a0a0a;
            border: 2px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .results {
            display: grid;
            gap: 1rem;
        }
        .result-item {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .op-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }
        .method {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .method-get { background: #10b981; color: white; }
        .method-post { background: #3b82f6; color: white; }
        .method-put { background: #f59e0b; color: white; }
        .method-patch { background: #8b5cf6; color: white; }
        .method-delete { background: #ef4444; color: white; }
        .api-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .op-path {
            font-family: 'Monaco', 'Courier New', monospace;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .op-summary {
            color: #e0e0e0;
            font-weight: 500;
        }
        .op-description {
            color: #999;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }
        .score {
            float: right;
            color: #667eea;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }
        .empty {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        .api-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .api-card {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #333;
            transition: all 0.2s;
        }
        .api-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        .api-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 0.5rem;
        }
        .api-desc {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .api-ops-count {
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Jentic Mini</h1>
            <p class="subtitle">Local AI Agent API Execution Layer &nbsp;·&nbsp;
                <a href="/docs" target="_blank" style="color:#667eea;text-decoration:none;">Swagger UI</a>
                &nbsp;·&nbsp;
                <a href="/redoc" target="_blank" style="color:#667eea;text-decoration:none;">Redoc</a>
                &nbsp;·&nbsp;
                <a href="/openapi.json" target="_blank" style="color:#667eea;text-decoration:none;">OpenAPI JSON</a>
            </p>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="api-count">-</div>
                    <div class="stat-label">APIs</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="op-count">-</div>
                    <div class="stat-label">Operations</div>
                </div>
                <div class="stat">
                    <div class="stat-value">BM25</div>
                    <div class="stat-label">Search</div>
                </div>
                <div class="stat">
                    <div class="stat-value">Arazzo</div>
                    <div class="stat-label">Workflows</div>
                </div>
            </div>
        </header>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search operations... (e.g., 'send email', 'create payment', 'text to speech')" autocomplete="off">
        </div>

        <div id="content">
            <div class="loading">Loading APIs...</div>
        </div>
    </div>

    <script>
        const API_KEY = '82660d51';
        const BASE_URL = window.location.origin;

        let allApis = [];
        let totalOps = 0;

        async function fetchApis() {
            const res = await fetch(`${BASE_URL}/apis`, {
                headers: { 'X-Jentic-API-Key': API_KEY }
            });
            return res.json();
        }

        async function search(query) {
            if (!query.trim()) return null;
            const res = await fetch(`${BASE_URL}/search`, {
                method: 'POST',
                headers: {
                    'X-Jentic-API-Key': API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query, limit: 20 })
            });
            return res.json();
        }

        function renderApiList(apis) {
            return `
                <div class="api-list">
                    ${apis.map(api => `
                        <div class="api-card">
                            <div class="api-name">${api.name}</div>
                            <div class="api-desc">${api.description || ''}</div>
                            <div class="api-ops-count">${api.operation_count || 0} operations</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderSearchResults(results) {
            if (!results || results.length === 0) {
                return '<div class="empty">No results found. Try a different search term.</div>';
            }
            return `
                <div class="results">
                    ${results.map(r => {
                        const op = r.operation;
                        const methodClass = `method-${op.method.toLowerCase()}`;
                        return `
                            <div class="result-item">
                                <div class="op-header">
                                    <span class="method ${methodClass}">${op.method}</span>
                                    <span class="api-badge">${op.api_id}</span>
                                    <span class="score">score: ${r.score.toFixed(2)}</span>
                                </div>
                                <div class="op-path">${op.path}</div>
                                <div class="op-summary">${op.summary || 'No summary'}</div>
                                ${op.description ? `<div class="op-description">${op.description}</div>` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        async function init() {
            allApis = await fetchApis();
            
            // Count total operations
            const opCounts = await Promise.all(
                allApis
                    .filter(api => !['httpbin', 'testapi'].includes(api.id))
                    .map(api => 
                        fetch(`${BASE_URL}/apis/${api.id}/operations`, {
                            headers: { 'X-Jentic-API-Key': API_KEY }
                        }).then(r => r.json()).then(ops => ops.length).catch(() => 0)
                    )
            );
            totalOps = opCounts.reduce((a, b) => a + b, 0);

            document.getElementById('api-count').textContent = allApis.filter(a => !['httpbin', 'testapi'].includes(a.id)).length;
            document.getElementById('op-count').textContent = totalOps.toLocaleString();

            document.getElementById('content').innerHTML = renderApiList(allApis.filter(a => !['httpbin', 'testapi'].includes(a.id)));
        }

        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value;
            
            clearTimeout(searchTimeout);
            
            if (!query.trim()) {
                document.getElementById('content').innerHTML = renderApiList(allApis.filter(a => !['httpbin', 'testapi'].includes(a.id)));
                return;
            }

            document.getElementById('content').innerHTML = '<div class="loading">Searching...</div>';
            
            searchTimeout = setTimeout(async () => {
                const results = await search(query);
                document.getElementById('content').innerHTML = renderSearchResults(results);
            }, 300);
        });

        init();
    </script>
</body>
</html>
