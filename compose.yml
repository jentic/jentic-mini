services:
  jentic-mini:
    build:
      context: ${JENTIC_HOST_PATH:-.}
      dockerfile: Dockerfile
    image: jentic-mini:latest
    container_name: jentic-mini
    user: "${JENTIC_UID:-1000}:${JENTIC_GID:-1000}"
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      - ${JENTIC_HOST_PATH:-.}/src:/app/src
      - ${JENTIC_DATA_PATH:-${JENTIC_HOST_PATH:-.}/data}:/app/data
    environment:
      JENTIC_PUBLIC_HOSTNAME: ${JENTIC_PUBLIC_HOSTNAME}
      # Extra subnets to trust, IN ADDITION TO built-in RFC-1918 + loopback defaults.
      # Comma-separated CIDRs. Add your Tailscale range, VPN, or office subnet here.
      # Example: 100.64.0.0/10,203.0.113.0/24
      # The built-in defaults (10/8, 172.16/12, 192.168/16, 127/8, ::1) always apply.
      JENTIC_TRUSTED_SUBNETS: ${JENTIC_TRUSTED_SUBNETS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WATCHTOWER_API_URL: http://jentic-watchtower:8080
      WATCHTOWER_TOKEN: ${WATCHTOWER_TOKEN:-jentic-update}
    labels:
      com.centurylinklabs.watchtower.scope: "jentic"

  # One-click upgrades via Watchtower. In dev mode (bind-mounted src/),
  # Watchtower can't upgrade the app — use `docker compose pull jentic-mini`
  # instead. In production (pulling from GHCR), the UI "Update now" button works.
  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: jentic-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "86400"
      WATCHTOWER_SCOPE: "jentic"
      WATCHTOWER_MONITOR_ONLY: "true"
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN:-jentic-update}
