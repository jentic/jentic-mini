# Local development configuration.
# Matches the Docker Compose service in docker/local-setup/docker-compose.yaml.
# All three surfaces share a single PostgreSQL instance, isolated by schema.
# Usage: JENTIC_CONFIG_FILE=config/local.yaml make start-app

databases:
  registry:
    host: localhost
    port: 5432
    name: jentic
    user: registry_user
    password: registry_pass
    schema_name: registry
  control:
    host: localhost
    port: 5432
    name: jentic
    user: control_user
    password: control_pass
    schema_name: control
  admin:
    host: localhost
    port: 5432
    name: jentic
    user: admin_user
    password: admin_pass
    schema_name: admin

runtime:
  debug: true
  log_level: DEBUG

# Raise the spec-fetch size cap for local catalog imports: several catalog
# specs (large Google/Stripe-style OpenAPI docs) exceed the conservative 5 MB
# default. 25 MiB is plenty for local testing.
ingest:
  max_spec_bytes: 26214400

# Mirror logs to a rotating JSON file under .jentic/logs in addition to stdout.
logging:
  file_enabled: true
  # file_dir: .jentic/logs   # default
  # file_name: app.log       # default

server:
  host: 127.0.0.1
  port: 8000
  reload: true

# Credential-at-rest encryption keyset. Required for credential WRITES — the
# control surface envelope-encrypts secrets with AES-256-GCM, and
# EncryptionService refuses to start with an empty keyset (credential POSTs
# would 500 with "EncryptionConfig.entries must not be empty"). This is a
# LOCAL-DEV-ONLY key (32 random bytes, base64); never reuse it anywhere real.
# Generate your own with: python -c "import os,base64;print(base64.b64encode(os.urandom(32)).decode())"
credentials:
  encryption:
    active_id: v1
    entries:
      - id: v1
        material: "vF7VWq2NJLr+uGDBFy9boIXfSJJIzqnTSF7iDDMKR5U="  # pragma: allowlist secret
  # Register the platform-managed OAuth2 provider so the authorization-code
  # connect flow can run locally. The redirect_uri must match the control
  # surface's published callback route.
  providers:
    direct_oauth2:
      kind: direct_oauth2
      redirect_uri: "http://127.0.0.1:8000/credentials/oauth/callback"
      # Extra query params appended to the authorize URL. Defaults force
      # the IdP consent screen (so re-connect doesn't silently no-op) and
      # ask Google to issue a refresh_token. Override per deployment if a
      # specific IdP needs different params, e.g. `{}` to disable, or
      # `{"prompt": "select_account"}` to let the user pick an account.
      authorize_extra_params:
        prompt: consent
        access_type: offline

# Pin the OAuth issuer / endpoint URIs and the expected JWT-Bearer assertion
# audience for local runs. Without this, canonical_base_url defaults to "" and
# the assertion audience collapses to "/oauth/token".
auth:
  canonical_base_url: "http://127.0.0.1:8000"

# No collector runs locally by default — point both signals at /dev/null
# so the terminal isn't spammed with retry warnings. Override these (or
# stand up an OTel collector on :4317) if you actually want telemetry.
observability:
  metrics:
    exporter: none
  tracing:
    exporter: none

# Anonymous product telemetry (issue #446). OFF by default — an instance whose
# config omits this block sends nothing. The onboarding CLI writes `enabled`
# explicitly (a yes-default prompt). `instance_id` seeds the durable admin-DB
# identity row on first boot (null → generated and persisted on first startup).
# Manual local opt-in pointing at a configurable ingest gateway.
# telemetry:
#   enabled: true
#   instance_id: change-me-to-a-uuid
#   endpoint: https://api.jentic.com/api/v1
