apiVersion: v2
name: jentic-one
description: Umbrella Helm chart for jentic-one services
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: broker
    version: 0.1.0
    condition: broker.enabled
  - name: app
    version: 0.1.0
    condition: app.enabled
  - name: registry
    version: 0.1.0
    condition: registry.enabled
  - name: admin
    version: 0.1.0
    condition: admin.enabled
  - name: control
    version: 0.1.0
    condition: control.enabled
  - name: gateway
    version: 0.1.0
    condition: gateway.enabled
  - name: postgresql
    version: 16.4.3
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
