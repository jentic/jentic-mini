{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-pg-init
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    # Intentionally NOT including 'hook-succeeded' here: the ConfigMap is
    # mounted by the Postgres StatefulSet at /docker-entrypoint-initdb.d/,
    # so it must persist for the lifetime of the release (kubelet remounts
    # it on every pod restart). With 'hook-succeeded' the ConfigMap was
    # deleted as soon as the hook completed, leaving the next pod-restart
    # stuck in ContainerCreating with "configmap not found".
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  # Mirrors docker/local-setup/init-schemas.sql: create per-surface schemas
  # AND the login roles + grants each surface uses to connect. The Bitnami
  # initdb scripts only run on first boot (empty data dir); if roles/grants
  # change, recreate the PVC (helm uninstall + delete pvc, or a fresh kind
  # cluster). DEV-ONLY static passwords — see global.databases in values.yaml.
  init-schemas.sql: |
    CREATE SCHEMA IF NOT EXISTS registry;
    CREATE SCHEMA IF NOT EXISTS control;
    CREATE SCHEMA IF NOT EXISTS admin;
    {{- range $surface, $db := .Values.global.databases }}

    -- {{ $surface }} surface role + grants
    DO $$ BEGIN
      IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ $db.user }}') THEN
        CREATE ROLE {{ $db.user }} LOGIN PASSWORD '{{ $db.password }}';
      END IF;
    END $$;
    GRANT USAGE, CREATE ON SCHEMA {{ $db.schema_name | default $db.schema }} TO {{ $db.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA {{ $db.schema_name | default $db.schema }} GRANT ALL ON TABLES TO {{ $db.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA {{ $db.schema_name | default $db.schema }} GRANT ALL ON SEQUENCES TO {{ $db.user }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA {{ $db.schema_name | default $db.schema }} GRANT ALL ON TYPES TO {{ $db.user }};
    {{- end }}
{{- end }}
