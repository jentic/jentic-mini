apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-broker
  labels:
    app.kubernetes.io/name: broker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: broker
    app.kubernetes.io/instance: {{ .Release.Name }}
