name: Bug report
description: Report a problem with Jentic One
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include
        secrets, credentials, or tokens in this report.

        For security vulnerabilities, do **not** open an issue — follow
        [SECURITY.md](https://github.com/jentic/jentic-one/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what you expected and what actually happened instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behaviour.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The Jentic One version or git commit you are running.
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Local (venv / from source)
        - Docker / Compose
        - Kubernetes / Helm
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS / environment
      description: e.g. macOS 15, Ubuntu 24.04, and the database backend (Postgres / SQLite).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redacted logs or error output. Remove any secrets first.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I have removed any secrets, credentials, or tokens from this report.
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/jentic/.github/blob/main/CODE_OF_CONDUCT.md).
          required: true
