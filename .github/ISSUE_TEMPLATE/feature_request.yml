name: Feature request
description: Suggest an idea or improvement for Jentic One
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's the use case? ("Nice to have" on its own is not a strong justification.)
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, if any.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/jentic/.github/blob/main/CODE_OF_CONDUCT.md).
          required: true
