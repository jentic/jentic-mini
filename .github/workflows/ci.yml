name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit & integration tests
        run: npm run test:run

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            ui/coverage/
            ui/playwright-report/
          retention-days: 7

  build-and-smoke-test:
    runs-on: ubuntu-latest
    needs: ui-tests
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker compose build

      - name: Start container (production-like, no bind mounts)
        run: |
          docker run -d --name jentic-mini \
            -p 8900:8900 \
            -v jentic-ci-data:/app/data \
            -e JENTIC_TELEMETRY=off \
            jentic-mini:latest

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8900/health > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          docker logs jentic-mini
          exit 1

      - name: Health check
        run: |
          response=$(curl -sf http://localhost:8900/health)
          echo "$response"
          echo "$response" | python3 -c "import sys, json; d = json.load(sys.stdin); assert d['status'] in ('ok', 'setup_required'), f'Unexpected status: {d}'"

      - name: Swagger UI loads
        run: curl -sf http://localhost:8900/docs | grep -q 'swagger-ui'

      - name: Static assets served
        run: |
          curl -sf -o /dev/null http://localhost:8900/static/swagger-ui-bundle.js
          curl -sf -o /dev/null http://localhost:8900/static/swagger-ui.css
          curl -sf -o /dev/null http://localhost:8900/static/redoc.standalone.js

      - name: Generate API key and test search
        run: |
          key=$(curl -sf -X POST http://localhost:8900/default-api-key/generate | python3 -c "import sys, json; print(json.load(sys.stdin)['key'])")
          echo "::add-mask::$key"
          curl -sf "http://localhost:8900/search?q=test" -H "X-Jentic-API-Key: $key" | python3 -c "import sys, json; d = json.load(sys.stdin); assert isinstance(d, list), f'Expected list, got {type(d)}'"

      - name: Dump logs on failure
        if: failure()
        run: docker logs jentic-mini

      - name: Stop container
        if: always()
        run: docker rm -f jentic-mini
