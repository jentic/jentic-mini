name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release @semantic-release/exec @semantic-release/git

      - name: Extract released version
        id: version
        run: |
          # semantic-release creates a tag on the current commit if a release was made
          tag=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [ -n "$tag" ]; then
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: release
    if: needs.release.outputs.version != ''
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
