name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'pdm.lock'
      # Self-reference: ensures edits to this workflow are validated on the PR that makes them.
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'alembic/**'
      - 'pyproject.toml'
      - 'pdm.lock'
      # Self-reference: ensures edits to this workflow are validated on the PR that makes them.
      - '.github/workflows/ci-backend.yml'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.11'
          version: '2.25.5'

      - name: Install dependencies
        run: pdm install --dev --frozen-lockfile

      - name: Run lint
        run: pdm run lint

  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pdm-project/setup-pdm@v4
        with:
          python-version: '3.11'
          version: '2.25.5'

      - name: Install dependencies
        run: pdm install --dev --frozen-lockfile

      - name: Run backend tests
        env:
          JENTIC_TELEMETRY: "off"
        run: pdm run python -m pytest tests/ -v --tb=short
