services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: jentic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jentic"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:
