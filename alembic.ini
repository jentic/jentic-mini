[alembic]
# Default section (unused directly; use named sections below).
script_location = src/jentic_one/migrations
path_separator = os

[registry]
script_location = src/jentic_one/migrations
version_locations = src/jentic_one/migrations/registry/versions
path_separator = os

[control]
script_location = src/jentic_one/migrations
version_locations = src/jentic_one/migrations/control/versions
path_separator = os

[admin]
script_location = src/jentic_one/migrations
version_locations = src/jentic_one/migrations/admin/versions
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
